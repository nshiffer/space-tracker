<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="rk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="fl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="trail" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- Star field -->
  <circle cx="80" cy="60" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="200" cy="120" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="340" cy="40" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="500" cy="90" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="650" cy="50" r="1.8" fill="#fff" opacity="0.6"/>
  <circle cx="780" cy="110" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="900" cy="30" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="1050" cy="80" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="1150" cy="45" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="130" cy="200" r="1.2" fill="#fff" opacity="0.4"/>
  <circle cx="1100" cy="180" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="60" cy="350" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="1140" cy="400" r="1.2" fill="#fff" opacity="0.4"/>
  <circle cx="250" cy="500" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="950" cy="550" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="440" cy="580" r="1.3" fill="#fff" opacity="0.2"/>
  <circle cx="750" cy="520" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="1080" cy="300" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="50" cy="500" r="1.5" fill="#fff" opacity="0.2"/>
  <circle cx="350" cy="300" r="1" fill="#fff" opacity="0.3"/>

  <!-- Rocket glow trail -->
  <ellipse cx="920" cy="315" rx="200" ry="300" fill="url(#trail)" transform="rotate(-45 920 315)"/>

  <!-- Rocket (right side) -->
  <g transform="translate(920, 280) rotate(-45) scale(6)">
    <path d="M-5,-18 Q0,-28 5,-18 Z" fill="url(#rk)"/>
    <rect x="-5" y="-18" width="10" height="24" rx="1" fill="url(#rk)"/>
    <circle cx="0" cy="-10" r="3" fill="url(#wn)"/>
    <circle cx="0" cy="-10" r="1.5" fill="#dbeafe" opacity="0.6"/>
    <path d="M-5,2 L-11,8 L-5,6 Z" fill="#3b82f6"/>
    <path d="M5,2 L11,8 L5,6 Z" fill="#3b82f6"/>
    <path d="M-4,6 Q0,20 4,6" fill="url(#fl)"/>
    <path d="M-2,6 Q0,15 2,6" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- Accent line -->
  <rect x="80" y="200" width="60" height="4" rx="2" fill="#3b82f6"/>

  <!-- Title text -->
  <text x="80" y="270" font-family="'Space Grotesk', 'Inter', -apple-system, sans-serif" font-size="72" font-weight="700" fill="#f1f5f9">Space Tracker</text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="'Inter', -apple-system, sans-serif" font-size="28" fill="#94a3b8">Track upcoming rocket launches in real-time</text>

  <!-- Feature pills -->
  <g transform="translate(80, 380)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#60a5fa">Live Countdown</text>

    <rect x="176" y="0" width="180" height="36" rx="18" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="266" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#60a5fa">Mission Details</text>

    <rect x="372" y="0" width="150" height="36" rx="18" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="447" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#60a5fa">Watch Live</text>
  </g>

  <!-- URL bar -->
  <text x="80" y="480" font-family="'Inter', -apple-system, sans-serif" font-size="18" fill="#64748b">nshiffer.github.io/space-tracker</text>

  <!-- Bottom border accent -->
  <rect x="0" y="624" width="1200" height="6" fill="#3b82f6"/>
</svg>
