  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="28" cy="34" r="2.5" fill="#fff" opacity="0.7"/>
  <circle cx="146" cy="22" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="22" cy="118" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="152" cy="135" r="2.5" fill="#fff" opacity="0.6"/>
  <circle cx="135" cy="78" r="1.8" fill="#fff" opacity="0.4"/>
  <circle cx="45" cy="146" r="2.2" fill="#fff" opacity="0.5"/>
  <circle cx="160" cy="55" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="38" cy="72" r="1.8" fill="#fff" opacity="0.4"/>
